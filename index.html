<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雙語數學：九九乘法足球PK戰 PRO</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #10b981;
            --danger: #ef4444;
            --field-green: #2e7d32;
        }
        * { box-sizing: border-box; font-family: 'Arial', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; touch-action: manipulation; }
        
        #game-container { width: 100%; max-width: 800px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; overflow: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        @media (min-width: 600px) {
            #game-container { min-height: 650px; height: 90vh; border-radius: 12px; }
        }

        /* 遊戲大廳 */
        #lobby { padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        h1 { text-align: center; color: var(--primary); margin: 10px 0; font-size: 1.5rem; }
        .setup-group { background: #f9fafb; padding: 12px; border-radius: 8px; border: 1px solid #e5e7eb; }
        .setup-label { font-weight: bold; font-size: 1rem; margin-bottom: 8px; display: block; color: #374151; }
        
        .number-picker { display: flex; align-items: center; gap: 10px; }
        .picker-btn { width: 44px; height: 44px; border: none; background: var(--primary); color: white; font-size: 1.5rem; border-radius: 6px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .picker-btn:active { transform: scale(0.95); }
        .picker-val { 
            font-size: 1.3rem; 
            font-weight: bold; 
            width: 80px; 
            text-align: center; 
            border: 2px solid #d1d5db;
            border-radius: 6px;
            background: white;
            padding: 5px 0;
        }
        .picker-val::-webkit-outer-spin-button,
        .picker-val::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .checkbox-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        .check-item { display: flex; align-items: center; justify-content: center; gap: 4px; background: white; padding: 10px 4px; border: 1px solid #d1d5db; border-radius: 6px; cursor: pointer; color: #374151; font-size: 0.9rem; }
        .check-item input { width: 20px; height: 20px; }
        .bulk-btns { display: flex; gap: 10px; }
        .btn-small { flex: 1; padding: 8px; background: #6b7280; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        
        .btn-start { padding: 15px; background: var(--accent); color: white; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; text-align: center; margin-top: 10px; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2); }
        .btn-start:active { background: #059669; transform: scale(0.98); }

        /* 足球場畫面 */
        #stage { display: none; flex-direction: column; flex-grow: 1; background: var(--field-green); position: relative; color: white; height: 100%; }
        
        #hud { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(0,0,0,0.5); font-size: 0.95rem; font-weight: bold; z-index: 10; }
        #timer { color: #fde047; font-size: 1.1rem; }

        #question-box { text-align: center; margin: 10px auto; background: rgba(255,255,255,0.95); color: #111827; padding: 8px 25px; border-radius: 30px; font-size: 2rem; font-weight: bold; border: 3px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10; }

        /* 球場與圖層設計 */
        #pitch-area { position: relative; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding-bottom: 20px; overflow: hidden; }
        
        #goal-post { position: absolute; top: 10px; width: 85%; height: 160px; z-index: 1; }
        #goal-post img { width: 100%; height: 100%; object-fit: fill; }
        
        #goalkeeper { 
            position: absolute; 
            width: 100px; 
            height: 130px; 
            top: 40px; 
            left: calc(50% - 50px); 
            z-index: 3; 
            transition: left 0.3s ease-out; 
        }
        #goalkeeper img { width: 100%; height: 100%; object-fit: contain; }
        
        .vibe { animation: idleVibe 0.3s ease-in-out infinite alternate; }
        @keyframes idleVibe { 
            0% { transform: translateY(0); } 
            100% { transform: translateY(-6px); } 
        }

        #football { 
            position: absolute; 
            bottom: 15px; 
            left: calc(50% - 30px); 
            width: 60px; 
            height: 60px; 
            font-size: 2.5rem; 
            text-align: center;
            line-height: 60px; 
            z-index: 4; 
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); 
        }

        /* 數字列與提示 (優化手機點擊體驗) */
        #lanes-container { position: absolute; top: 160px; width: 90%; display: flex; justify-content: space-between; z-index: 20; }
        .lane-target { 
            width: 30%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            background: rgba(0, 0, 0, 0.7); 
            border-radius: 10px; 
            padding: 10px 0; 
            border: 2px solid rgba(255,255,255,0.6); 
            cursor: pointer;
            user-select: none;
        }
        .lane-target:active {
            background: rgba(16, 185, 129, 0.8);
            transform: scale(0.95);
        }
        .lane-num { font-size: 1.8rem; font-weight: bold; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .key-hint { background: #fff; color: #000; font-weight: bold; border-radius: 4px; padding: 2px 10px; font-size: 0.9rem; margin-top: 4px; pointer-events: none; }

        /* 即時大字回饋層 */
        #feedback-banner { 
            display: none; 
            position: absolute; 
            top: 45%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            font-size: 2.2rem; 
            font-weight: bold; 
            z-index: 50; 
            text-align: center; 
            pointer-events: none; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 10px 20px; 
            border-radius: 15px; 
            border: 4px solid currentColor; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); 
            white-space: nowrap; 
        }
        
        /* 結算覆蓋層 */
        #gameover-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        #result-title { font-size: 2.8rem; font-weight: bold; margin-bottom: 20px; }
        .btn-action { padding: 12px 30px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background: var(--primary); color: white; }
        
        .btn-abort { padding: 6px 12px; background: var(--danger); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="lobby">
        <h1>⚽ RCCR 雙語數學<br>九九乘法足球 PK 戰 ⚽</h1>
        
        <div class="setup-group">
            <span class="setup-label">1. 每回合秒數 (Seconds per round):</span>
            <div class="number-picker">
                <button class="picker-btn" onclick="adjustValue('sec', -1)">-</button>
                <input type="number" class="picker-val" id="val-sec" value="10" min="3" max="999" onchange="manualAdjust('sec')">
                <button class="picker-btn" onclick="adjustValue('sec', 1)">+</button>
            </div>
        </div>

        <div class="setup-group">
            <span class="setup-label">2. 乘法範圍 (Multiplication Range):</span>
            <div class="checkbox-grid" id="range-grid"></div>
            <div class="bulk-btns">
                <button class="btn-small" onclick="bulkSelect(true)">Select All</button>
                <button class="btn-small" onclick="bulkSelect(false)">Clear All</button>
            </div>
        </div>

        <div class="setup-group">
            <span class="setup-label">3. 目標進球數 (Target Goals to Win):</span>
            <div class="number-picker">
                <button class="picker-btn" onclick="adjustValue('goals', -1)">-</button>
                <input type="number" class="picker-val" id="val-goals" value="5" min="1" max="99" onchange="manualAdjust('goals')">
                <button class="picker-btn" onclick="adjustValue('goals', 1)">+</button>
            </div>
        </div>

        <button class="btn-start" onclick="startGame()">開始比賽 (Start Match)</button>
    </div>

    <div id="stage">
        <div id="hud">
            <div>⚽ <span id="hud-score">0</span> / <span id="hud-target">5</span></div>
            <div id="timer">⏱️ 10s</div>            
            <div>🔮 剩餘: <span id="hud-balls">8</span></div>
            <button class="btn-abort" onclick="abortToLobby()">🏠 大廳</button>
        </div>

        <div id="question-box">0 × 0 = ?</div>

        <div id="pitch-area">
            <div id="goal-post">
                <img src="goal.png" alt="Goal" onerror="this.style.display='none'">
            </div>
            
            <div id="goalkeeper" class="vibe">
                <img id="keeper-img" src="keeper-ready.png" alt="Keeper" onerror="this.style.display='none'">
            </div>
            
            <!-- 整個 lane-target 區域都可以點擊 -->
            <div id="lanes-container">
                <div class="lane-target" id="lane-L" onclick="handleKick('L')">
                    <span class="lane-num" id="num-L">-</span>
                    <span class="key-hint">←</span>
                </div>
                <div class="lane-target" id="lane-C" onclick="handleKick('C')">
                    <span class="lane-num" id="num-C">-</span>
                    <span class="key-hint">↑</span>
                </div>
                <div class="lane-target" id="lane-R" onclick="handleKick('R')">
                    <span class="lane-num" id="num-R">-</span>
                    <span class="key-hint">→</span>
                </div>
            </div>

            <div id="football">⚽</div>
        </div>
        
        <div id="feedback-banner">GOAL!!</div>
    </div>

    <div id="gameover-overlay">
        <div id="result-title">比賽結束</div>
        <button class="btn-action" onclick="backToLobby()">返回大廳</button>
    </div>
</div>

<script>
    let config = { sec: 10, goals: 5, ranges: [] };
    let gameState = { currentGoal: 0, ballsLeft: 0, currentAnswer: 0, correctLane: '', isLock: false, timerId: null, timeLeft: 0, globalNextTimeout: null };

    // 音效解鎖機制（配合手機權限）
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playSound(type) {
        if (!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(659.25, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.linearRampToValueAtTime(110, now + 0.4);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'victory') {
                osc.type = 'triangle';
                let notes = [523.25, 587.33, 659.25, 783.99];
                notes.forEach((f, i) => osc.frequency.setValueAtTime(f, now + i * 0.15));
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.7);
                osc.start(now);
                osc.stop(now + 0.7);
            } else if (type === 'gameover') {
                osc.type = 'sawtooth';
                let notes = [293.66, 277.18, 261.63, 220.00];
                notes.forEach((f, i) => osc.frequency.setValueAtTime(f, now + i * 0.2));
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                osc.start(now);
                osc.stop(now + 0.8);
            }
        } catch(e) { console.log(e); }
    }

    // 初始化選項
    const rangeGrid = document.getElementById('range-grid');
    for (let i = 2; i <= 9; i++) {
        rangeGrid.innerHTML += `
            <label class="check-item">
                <input type="checkbox" value="${i}" checked>
                <span>${i} 乘</span>
            </label>
        `;
    }

    function adjustValue(type, change) {
        if (type === 'sec') {
            config.sec = Math.max(3, config.sec + change);
            document.getElementById('val-sec').value = config.sec;
        } else if (type === 'goals') {
            config.goals = Math.max(1, config.goals + change);
            document.getElementById('val-goals').value = config.goals;
        }
    }

    function manualAdjust(type) {
        if (type === 'sec') {
            let val = parseInt(document.getElementById('val-sec').value) || 10;
            config.sec = Math.max(3, val);
            document.getElementById('val-sec').value = config.sec;
        } else if (type === 'goals') {
            let val = parseInt(document.getElementById('val-goals').value) || 5;
            config.goals = Math.max(1, val);
            document.getElementById('val-goals').value = config.goals;
        }
    }

    function bulkSelect(isAll) {
        rangeGrid.querySelectorAll('input').forEach(cb => cb.checked = isAll);
    }

    function startGame() {
        initAudio(); // 點擊按鈕時解鎖手機音效
        config.ranges = Array.from(rangeGrid.querySelectorAll('input:checked')).map(cb => parseInt(cb.value));
        if (config.ranges.length === 0) {
            alert('請至少勾選一個乘法範圍！');
            return;
        }
        
        gameState.currentGoal = 0;
        gameState.ballsLeft = config.goals + 3;
        
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('stage').style.display = 'flex';
        
        updateHud();
        generateQuestion();
    }

    function updateHud() {
        document.getElementById('hud-score').innerText = gameState.currentGoal;
        document.getElementById('hud-target').innerText = config.goals;
        document.getElementById('hud-balls').innerText = gameState.ballsLeft;
    }

    function generateQuestion() {
        gameState.isLock = false;
        resetPitchPositions();
        
        const num1 = config.ranges[Math.floor(Math.random() * config.ranges.length)];
        const num2 = Math.floor(Math.random() * 8) + 2; 
        const correctAns = num1 * num2;
        gameState.currentAnswer = correctAns;
        
        document.getElementById('question-box').innerText = `${num1} × ${num2} = ?`;
        
        let pool = new Set([correctAns]);
        pool.add(correctAns + (Math.random() > 0.5 ? 2 : -2));
        pool.add(correctAns + (Math.random() > 0.5 ? 6 : -6));
        if (num2 > 2) pool.add(num1 * (num2 - 1));
        if (num2 < 9) pool.add(num1 * (num2 + 1));
        
        while (pool.size < 3) { pool.add(correctAns + Math.floor(Math.random() * 15) - 7); }
        
        let finalOptions = Array.from(pool).slice(0, 3);
        finalOptions.sort(() => Math.random() - 0.5);
        
        const lanes = ['L', 'C', 'R'];
        lanes.forEach((lane, index) => {
            document.getElementById(`num-${lane}`).innerText = finalOptions[index];
            if (finalOptions[index] === correctAns) gameState.correctLane = lane;
        });
        
        startTimer();
    }

    function startTimer() {
        clearInterval(gameState.timerId);
        gameState.timeLeft = config.sec;
        document.getElementById('timer').innerText = `⏱️ ${gameState.timeLeft}s`;
        
        gameState.timerId = setInterval(() => {
            gameState.timeLeft--;
            document.getElementById('timer').innerText = `⏱️ ${gameState.timeLeft}s`;
            
            if (gameState.timeLeft <= 0) {
                clearInterval(gameState.timerId);
                handleKick('TIMEOUT');
            }
        }, 1000);
    }

    function resetPitchPositions() {
        const keeper = document.getElementById('goalkeeper');
        const keeperImg = document.getElementById('keeper-img');
        const ball = document.getElementById('football');
        const banner = document.getElementById('feedback-banner');
        
        banner.style.display = 'none';
        keeper.style.left = 'calc(50% - 50px)';
        keeper.classList.add('vibe');
        keeperImg.src = 'keeper-ready.png';
        
        ball.style.bottom = '15px';
        ball.style.left = 'calc(50% - 30px)';
        ball.style.transform = 'scale(1) rotate(0deg)';
        ball.style.opacity = '1';
    }

    // 鍵盤監聽（保留電腦玩的功能）
    window.addEventListener('keydown', (e) => {
        if (gameState.isLock || document.getElementById('stage').style.display !== 'flex') return;
        if (e.key === 'ArrowLeft') handleKick('L');
        else if (e.key === 'ArrowUp') handleKick('C');
        else if (e.key === 'ArrowRight') handleKick('R');
    });

    function handleKick(chosenLane) {
        if (gameState.isLock) return;
        gameState.isLock = true;
        clearInterval(gameState.timerId);
        
        const ball = document.getElementById('football');
        const keeper = document.getElementById('goalkeeper');
        const keeperImg = document.getElementById('keeper-img');
        
        keeper.classList.remove('vibe');
        
        if (chosenLane === 'TIMEOUT') {
            gameState.ballsLeft--;
            updateHud();
            playSound('wrong');
            showFeedbackBanner("TIMEOUT 逾時 🚫", false);
            return;
        }

        gameState.ballsLeft--;
        updateHud();
        
        const targetPos = { 'L': '15%', 'C': 'calc(50% - 30px)', 'R': '70%' };
        const isCorrect = (chosenLane === gameState.correctLane);
        
        // 射門動畫
        ball.style.bottom = '200px';
        ball.style.left = targetPos[chosenLane];
        ball.style.transform = 'scale(0.6) rotate(360deg)';
        
        if (isCorrect) {
            let wrongLanes = ['L', 'C', 'R'].filter(l => l !== chosenLane);
            let randomWrong = wrongLanes[Math.floor(Math.random() * wrongLanes.length)];
            
            if (randomWrong === 'C') {
                keeperImg.src = 'keeper-center.png';
            } else if (randomWrong === 'L') {
                keeperImg.src = 'keeper-left.png';
                keeper.style.left = '15%';
            } else {
                keeperImg.src = 'keeper-right.png';
                keeper.style.left = '70%';
            }
            
            setTimeout(() => {
                playSound('correct');
                gameState.currentGoal++;
                updateHud();
                showFeedbackBanner("GOAL!! 🎉", true);
            }, 350);
            
        } else {
            if (chosenLane === 'C') {
                keeperImg.src = 'keeper-center.png';
            } else if (chosenLane === 'L') {
                keeperImg.src = 'keeper-left.png';
                keeper.style.left = '15%';
            } else if (chosenLane === 'R') {
                keeperImg.src = 'keeper-right.png';
                keeper.style.left = '70%';
            }
            
            setTimeout(() => {
                playSound('wrong');
                ball.style.bottom = '120px';
                showFeedbackBanner("SAVE! ❌", false);
            }, 300);
        }
    }

    function showFeedbackBanner(text, isGoal) {
        const banner = document.getElementById('feedback-banner');
        banner.innerText = text;
        banner.style.color = isGoal ? '#10b981' : '#ef4444';
        banner.style.display = 'block';
        
        if (gameState.currentGoal >= config.goals) {
            clearTimeout(gameState.globalNextTimeout);
            setTimeout(() => {
                playSound('victory');
                showEndOverlay("You win！ 🏆", '#10b981');
            }, 1000);
        } else if (gameState.ballsLeft < (config.goals - gameState.currentGoal)) {
            clearTimeout(gameState.globalNextTimeout);
            setTimeout(() => {
                playSound('gameover');
                showEndOverlay("You lose. 💔", '#ef4444');
            }, 1000);
        } else {
            gameState.globalNextTimeout = setTimeout(() => {
                generateQuestion();
            }, 1400);
        }
    }

    function showEndOverlay(msg, color) {
        const overlay = document.getElementById('gameover-overlay');
        const title = document.getElementById('result-title');
        title.innerHTML = msg;
        title.style.color = color;
        overlay.style.display = 'flex';
    }

    function backToLobby() {
        document.getElementById('gameover-overlay').style.display = 'none';
        document.getElementById('stage').style.display = 'none';
        document.getElementById('lobby').style.display = 'flex';
    }

    function abortToLobby() {
        clearInterval(gameState.timerId);
        clearTimeout(gameState.globalNextTimeout);
        document.getElementById('stage').style.display = 'none';
        document.getElementById('lobby').style.display = 'flex';
        gameState.isLock = false;
    }
</script>

</body>
</html>
